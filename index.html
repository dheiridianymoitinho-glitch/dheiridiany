<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css" />
    <title>Mundo dos Tigres</title>
</head>
<body>

    <header class="cabecalho" style="background-color:#d35400;">
        <h1>Mundo dos Tigres</h1>
        <nav>
            <a href="#" class="cabecalho-link">Início</a>
        </nav>
    </header>

    <main>
        <h2>Descubra a verdade passando o mouse!</h2>

        <section>

            <!-- Cartão 1 -->
            <article class="cartao">
                <div class="cartao-interno">

                    <div class="cartao-frente">
                        <img src="photo-1672657805996-ba01a2fd6d6e.avif" alt="Tigre" class="cartao-imagem">
                        <p>Todos os tigres têm listras iguais.</p>
                    </div>

                    <div class="cartao-verso">
                        <img src="Sumatratiger-004.jpg" alt="Tigre" class="cartao-imagem">
                        <p>Falso! Cada tigre possui um padrão único de listras.</p>
                    </div>

                </div>
            </article>

            <!-- Cartão 2 -->
            <article class="cartao">
                <div class="cartao-interno">

                    <div class="cartao-frente">
                        <img src="Sumatratiger-004.jpg" alt="Tigre" class="cartao-imagem">
                        <p>Os tigres são excelentes nadadores.</p>
                    </div>

                    <div class="cartao-verso">
                        <img src="Sumatratiger-004.jpg" alt="Tigre" class="cartao-imagem">
                        <p>Verdade! Eles gostam de água e podem nadar longas distâncias.</p>
                    </div>

                </div>
            </article>

        </section>
    </main>

    <footer style="background-color:#d35400; color:white; text-align:center; padding:15px;">
        <p>Feito por Dheiridiany</p>
    </footer>

</body>
</html>
